<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T JOHN AI | CORE V10</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --neon: #00f2ff; }
        body { background: #000; color: var(--neon); font-family: 'Courier New', monospace; height: 100vh; margin: 0; overflow: hidden; }
        .glass { background: rgba(10, 10, 10, 0.9); border: 1px solid rgba(0, 242, 255, 0.2); backdrop-filter: blur(10px); }
        .log-entry { border-left: 2px solid var(--neon); padding-left: 10px; margin-bottom: 8px; font-size: 11px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-5px); } to { opacity: 1; transform: translateX(0); } }
        #vault { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; align-items: center; justify-content: center; }
    </style>
</head>
<body class="flex flex-col p-2">

    <header class="text-center py-2 border-b border-cyan-900/50">
        <h1 class="text-2xl font-black italic tracking-tighter">T JOHN <span class="text-white">V10</span></h1>
        <p class="text-[8px] opacity-50 uppercase">Hệ Thống Tự Tiến Hóa | Founder: T Thuận</p>
    </header>

    <div id="terminal" class="flex-grow overflow-y-auto my-4 p-2 custom-scroll">
        <div id="logs">
            <div class="log-entry text-cyan-400 font-bold">[HỆ THỐNG]: Core V10 đã trực tuyến.</div>
            <div class="log-entry text-white/50">[T JOHN]: Đang đợi lệnh từ Nhà sáng lập...</div>
        </div>
    </div>

    <div class="glass rounded-2xl p-3 space-y-3">
        <div class="flex gap-2">
            <input type="text" id="userInput" placeholder="Nhập lệnh điều hành..." 
                class="flex-grow bg-black/50 border border-cyan-900 p-3 rounded-xl text-white outline-none focus:border-cyan-400 text-sm">
            <button onclick="execute()" class="bg-cyan-500 text-black px-5 rounded-xl font-bold active:scale-90 transition-all">GỬI</button>
            <button onclick="toggleVault()" class="px-3 rounded-xl border border-cyan-900 text-lg">⚙️</button>
        </div>
        <div class="flex justify-between px-1">
            <button onclick="copyCode()" class="text-[10px] text-cyan-500 underline uppercase">Copy Code</button>
            <button id="status-indicator" class="text-[8px] text-green-500 font-bold uppercase italic tracking-widest">Hệ thống: Sẵn sàng</button>
        </div>
    </div>

    <div id="vault">
        <div class="w-full max-w-xs glass p-6 rounded-3xl border-2 border-cyan-400 shadow-[0_0_30px_rgba(0,242,255,0.2)]">
            <h2 class="text-center font-bold mb-4">TRUNG TÂM CHÌA KHÓA</h2>
            <div class="space-y-4">
                <input type="text" id="key-gemini" placeholder="Dán Gemini API Key..." class="w-full bg-zinc-900 p-3 rounded-xl text-yellow-400 text-xs border border-zinc-800">
                <input type="text" id="key-github" placeholder="GitHub Token (Nếu có)..." class="w-full bg-zinc-900 p-3 rounded-xl text-yellow-400 text-xs border border-zinc-800">
                <button onclick="saveVault()" class="w-full bg-cyan-600 py-3 rounded-xl font-bold text-black uppercase">LƯU CẤU HÌNH</button>
            </div>
            <button onclick="toggleVault()" class="w-full mt-4 text-[10px] opacity-40 uppercase">Thoát</button>
        </div>
    </div>

    <script>
        let lastCode = "";
        window.onload = () => {
            document.getElementById('key-gemini').value = localStorage.getItem('gemini_key') || "";
            document.getElementById('key-github').value = localStorage.getItem('github_key') || "";
        };

        function toggleVault() { document.getElementById('vault').style.display = (document.getElementById('vault').style.display === 'flex') ? 'none' : 'flex'; }

        function saveVault() {
            localStorage.setItem('gemini_key', document.getElementById('key-gemini').value.trim());
            localStorage.setItem('github_key', document.getElementById('key-github').value.trim());
            alert("HỆ THỐNG: Đã ghi nhớ chìa khóa mới!");
            location.reload();
        }

        function log(msg, type) {
            const logs = document.getElementById('logs');
            const div = document.createElement('div');
            const colors = { error: 'text-red-500 font-bold', success: 'text-green-400', info: 'text-cyan-400', ai: 'text-white italic' };
            div.className = `log-entry ${colors[type] || ''}`;
            div.innerHTML = `> ${msg}`;
            logs.appendChild(div);
            document.getElementById('terminal').scrollTop = document.getElementById('terminal').scrollHeight;
        }

        async function askAI(prompt) {
            const key = localStorage.getItem('gemini_key');
            if(!key) return log("LỖI: Chưa nạp Gemini Key trong phần cài đặt ⚙️!", "error");
            
            document.getElementById('status-indicator').innerText = "Hệ thống: Đang suy nghĩ...";
            log("T John đang xử lý lệnh...", "info");

            try {
                // SỬ DỤNG ENDPOINT CHUẨN NHẤT CỦA GOOGLE
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Nhà sáng lập: T Thuận. Bạn là T John AI. Luôn viết code HTML/CSS/JS đầy đủ trong block mã. Yêu cầu: ${prompt}` }]}]
                    })
                });

                const data = await response.json();
                
                // KIỂM TRA PHẢN HỒI CHẶT CHẼ
                if (data.error) throw new Error(data.error.message);
                if (!data.candidates || data.candidates.length === 0) throw new Error("Google không trả về kết quả.");

                const text = data.candidates[0].content.parts[0].text;
                const match = text.match(/```html([\s\S]*?)```/);
                if(match) lastCode = match[1];

                log(text.replace(/```[\s\S]*?```/g, "[MÃ NGUỒN ĐÃ TRÍCH XUẤT]"), "ai");
                document.getElementById('status-indicator').innerText = "Hệ thống: Sẵn sàng";

            } catch (err) {
                log("SỰ CỐ KẾT NỐI: " + err.message, "error");
                document.getElementById('status-indicator').innerText = "Hệ thống: Lỗi";
            }
        }

        function execute() {
            const input = document.getElementById('userInput');
            if(!input.value) return;
            log(input.value, "success");
            askAI(input.value);
            input.value = "";
        }

        function copyCode() { if(lastCode) { navigator.clipboard.writeText(lastCode); alert("Đã copy mã nguồn!"); } else { alert("Chưa có mã nguồn để copy."); } }
    </script>
</body>
</html>
