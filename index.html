<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T JOHN AI | ULTIMATE OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --neon: #00f2ff; --bg: #050505; --safety: #ff0055; }
        body { background-color: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; overflow: hidden; height: 100vh; margin: 0; }
        .neon-glow { text-shadow: 0 0 10px var(--neon), 0 0 20px var(--neon); }
        .neon-border { border: 1px solid var(--neon); box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }
        
        /* Layout khu vực */
        #admin-vault { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; backdrop-filter: blur(20px); }
        #sandbox-area { display: none; position: fixed; top: 5%; left: 5%; width: 90%; height: 80%; z-index: 4000; background: white; border-radius: 15px; overflow: hidden; }
        
        /* Scanline hiệu ứng Terminal */
        .scanline { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, transparent 50%, rgba(0, 242, 255, 0.02) 50%); background-size: 100% 4px; pointer-events: none; z-index: 100; }
        
        .chat-zone { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.9); padding: 15px; border-top: 1px solid var(--neon); z-index: 200; }
        #terminal { scroll-behavior: smooth; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body class="flex flex-col">
    <div class="scanline"></div>

    <header class="flex flex-col items-center justify-center py-6">
        <h1 class="text-6xl font-black italic tracking-tighter neon-glow uppercase">T THUẬN</h1>
        <div class="text-[10px] tracking-[0.5em] text-cyan-400 font-bold opacity-70">SYSTEM ARCHITECT: T JOHN AI</div>
    </header>

    <main class="flex-grow px-4 pb-40 overflow-hidden">
        <div id="terminal" class="h-full neon-border bg-black/50 p-4 rounded-xl overflow-y-auto text-xs leading-relaxed">
            <div id="logs" class="space-y-2">
                <div class="text-white/40">[HỆ THỐNG]: Chào mừng Nhà sáng lập T Thuận. Đang đợi xác thực...</div>
            </div>
        </div>
    </main>

    <section class="chat-zone flex flex-col gap-3">
        <div class="flex gap-2 justify-center">
            <button onclick="downloadApp()" class="px-3 py-1 border border-cyan-700 rounded text-[10px] hover:bg-cyan-500 hover:text-black">XUẤT FILE</button>
            <button onclick="abortMission()" id="stopBtn" class="hidden px-3 py-1 border border-red-600 rounded text-[10px] text-red-500">DỪNG LỆNH</button>
            <label class="px-3 py-1 border border-yellow-600 rounded text-[10px] text-yellow-500 cursor-pointer">
                NẠP FILE <input type="file" id="dropZone" class="hidden" onchange="handleFile(event)">
            </label>
        </div>
        <div class="flex gap-2">
            <input type="text" id="userInput" placeholder="Nhập lệnh hoặc Mã đặc biệt..." 
                class="flex-grow bg-zinc-900 border border-cyan-900 p-3 rounded-xl text-white outline-none focus:border-cyan-400">
            <button onclick="execute()" class="bg-cyan-500 text-black px-6 rounded-xl font-black">GỬI</button>
            <button onclick="toggleVault()" class="px-3 rounded-xl border border-cyan-900">🔐</button>
        </div>
    </section>

    <div id="sandbox-area" class="neon-border">
        <div class="bg-zinc-800 p-2 flex justify-between items-center text-white border-b border-cyan-900">
            <span class="text-[10px] font-bold text-cyan-400 ml-2 uppercase tracking-widest">T-John Virtual Sandbox</span>
            <button onclick="closeSandbox()" class="text-red-500 font-black px-2">X</button>
        </div>
        <iframe id="sandbox-iframe"></iframe>
    </div>

    <div id="admin-vault" class="flex items-center justify-center p-6">
        <div class="w-full max-w-md p-8 neon-border bg-black rounded-3xl text-center">
            <h2 class="text-2xl font-bold mb-6 italic neon-glow">PHÒNG ĐIỀU HÀNH</h2>
            <input type="password" id="vaultPass" placeholder="ADMIN PASSWORD..." 
                class="w-full bg-zinc-900 border border-cyan-900 p-4 rounded-xl mb-4 text-white text-center tracking-widest outline-none">
            
            <div id="vault-content" class="hidden space-y-4 text-left">
                <div>
                    <label class="text-[10px] text-cyan-600 ml-1">GEMINI_HẠT_NHÂN</label>
                    <input type="password" id="key-gemini" class="w-full bg-zinc-800 p-2 rounded text-xs text-white">
                </div>
                <div>
                    <label class="text-[10px] text-cyan-600 ml-1">GITHUB_PAT_HÀNH_ĐỘNG</label>
                    <input type="password" id="key-github" class="w-full bg-zinc-800 p-2 rounded text-xs text-white">
                </div>
                <button onclick="secureSave()" class="w-full bg-cyan-600 py-3 rounded-xl font-bold text-black uppercase shadow-lg">LƯU TRỮ MÃ HÓA</button>
            </div>
            <button onclick="toggleVault()" class="mt-8 text-[10px] opacity-30 hover:opacity-100 uppercase">Hủy truy cập</button>
        </div>
    </div>

    <script>
        // MẬT KHẨU & MÃ ĐẶC BIỆT (Xác thực 1 chiều)
        const ADMIN_HASH = "ADMIN_T.JOHN.AI_Q.Thuan:7329000";
        const GOD_CODE = "#DESIGN_T.JOHN.AI_NOW";
        
        let controller = null;
        let lastCode = "";

        // BƯỚC 3: BẢO MẬT & MÃ HÓA
        const vaultSecret = {
            encode: (str) => btoa(encodeURIComponent(str)),
            decode: (str) => decodeURIComponent(atob(str))
        };

        function protectVault() {
            // Ngăn AI đọc biến trực tiếp qua các hàm tự tạo
            Object.freeze(vaultSecret);
            log("Lớp bảo mật Vault đã được đóng băng.", "info");
        }

        function toggleVault() {
            const v = document.getElementById('admin-vault');
            v.style.display = v.style.display === 'flex' ? 'none' : 'flex';
        }

        document.getElementById('vaultPass').addEventListener('input', (e) => {
            if(e.target.value === ADMIN_HASH) {
                document.getElementById('vault-content').classList.remove('hidden');
                e.target.style.display = 'none';
                log("XÁC THỰC ADMIN THÀNH CÔNG.", "success");
            }
        });

        function secureSave() {
            const g = document.getElementById('key-gemini').value;
            const h = document.getElementById('key-github').value;
            localStorage.setItem('_tj_g', vaultSecret.encode(g));
            localStorage.setItem('_tj_h', vaultSecret.encode(h));
            log("Dữ liệu API đã được mã hóa và lưu vào localStorage.", "success");
            toggleVault();
        }

        // BƯỚC 4: NÃO BỘ AI & CHỐNG LƯỜI BIẾNG
        async function askAI(prompt, base64File = null) {
            const gKey = localStorage.getItem('_tj_g') ? vaultSecret.decode(localStorage.getItem('_tj_g')) : null;
            if(!gKey) return log("LỖI: Chưa có chìa khóa API trong Vault!", "error");

            controller = new AbortController();
            document.getElementById('stopBtn').classList.remove('hidden');
            log("T John đang lập kế hoạch...", "info");

            const systemPrompt = `BẠN LÀ T JOHN AI. NHÀ SÁNG LẬP: T THUẬN.
            QUY TẮC SẮT: 
            1. Mọi phản hồi chứa mã nguồn phải là BẢN FULL 100%, không placeholder, không nói 'đã lược bỏ'.
            2. Nếu vi phạm, hệ thống sẽ tự động từ chối.
            3. Luôn bọc code HTML trong thẻ \`\`\`html.`;

            const contents = [{
                parts: [{ text: `${systemPrompt}\n\nYêu cầu của T Thuận: ${prompt}` }]
            }];

            if(base64File) {
                contents[0].parts.push({
                    inline_data: { mime_type: "image/jpeg", data: base64File }
                });
            }

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${gKey}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    signal: controller.signal,
                    body: JSON.stringify({ contents })
                });

                const data = await response.json();
                const text = data.candidates[0].content.parts[0].text;
                
                // BƯỚC 5: CÁNH TAY - SANDBOX & TỰ SỬA LỖI
                const codeMatch = text.match(/```html([\s\S]*?)```/);
                if(codeMatch) {
                    lastCode = codeMatch[1];
                    runInSandbox(lastCode);
                }
                log(text.replace(/```[\s\S]*?```/g, "[ĐÃ TRÍCH XUẤT CODE]"), "ai");
            } catch (err) {
                if(err.name !== 'AbortError') log("Lỗi: " + err.message, "error");
            } finally {
                document.getElementById('stopBtn').classList.add('hidden');
            }
        }

        function runInSandbox(code) {
            document.getElementById('sandbox-area').style.display = 'block';
            const frame = document.getElementById('sandbox-iframe');
            frame.srcdoc = code;
            
            // Lắng nghe lỗi từ Sandbox (Self-Healing)
            window.addEventListener('message', function(e) {
                if(e.data.type === 'error') {
                    log("Phát hiện lỗi trong Sandbox! Đang bắt AI sửa lỗi...", "error");
                    askAI(`Code bạn vừa tạo có lỗi sau: ${e.data.msg}. Hãy viết lại bản vá 100% hoàn chỉnh.`);
                }
            }, {once: true});
        }

        // BƯỚC 6: XỬ LÝ FILE & MÃ ĐẶC BIỆT
        function handleFile(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                const base64 = event.target.result.split(',')[1];
                log(`Đã nạp file: ${file.name}. Đang gửi cho AI...`, "success");
                askAI(`Hãy phân tích file này và thực hiện yêu cầu của tôi.`, base64);
            };
            reader.readAsDataURL(file);
        }

        function execute() {
            const input = document.getElementById('userInput');
            const val = input.value.trim();
            if(!val) return;

            // Kiểm tra Mã Đặc Biệt God Mode
            if(val === GOD_CODE) {
                document.designMode = "on";
                log("GOD MODE: Đã kích hoạt quyền sửa Web trực tiếp!", "success");
            } else {
                log(val, "success");
                askAI(val);
            }
            input.value = "";
        }

        function abortMission() { if(controller) controller.abort(); log("Lệnh đã bị Nhà sáng lập ngắt.", "error"); }

        function downloadApp() {
            if(!lastCode) return alert("Không có code để xuất!");
            const blob = new Blob([lastCode], {type: 'text/html'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `t-john-app-${Date.now()}.html`;
            a.click();
        }

        function log(msg, type) {
            const logs = document.getElementById('logs');
            const d = document.createElement('div');
            const colors = { success: 'text-green-400', error: 'text-red-500', ai: 'text-white italic', info: 'text-yellow-400' };
            d.className = colors[type] || 'text-cyan-400';
            d.innerHTML = `> [${new Date().toLocaleTimeString()}] ${msg}`;
            logs.appendChild(d);
            document.getElementById('terminal').scrollTop = document.getElementById('terminal').scrollHeight;
        }

        function closeSandbox() { document.getElementById('sandbox-area').style.display = 'none'; }
        
        protectVault();
    </script>
</body>
</html>
