<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T JOHN AI | CORE V11.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
      {
        "imports": {
          "@google/generative-ai": "https://esm.run/@google/generative-ai"
        }
      }
    </script>
    <style>
        :root { --neon: #00f2ff; --bg: #050505; }
        body { 
            background: var(--bg) url('https://raw.githubusercontent.com/Thuan101/T-John-Ai/main/1000181678.jpg') no-repeat center center fixed; 
            background-size: cover; color: var(--neon); font-family: 'Courier New', monospace; 
            height: 100vh; margin: 0; overflow: hidden; display: flex; flex-direction: column;
        }
        .neon-glow { text-shadow: 0 0 10px var(--neon), 0 0 20px var(--neon); }
        .glass { background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(0, 242, 255, 0.3); }
        .log-entry { border-left: 2px solid var(--neon); padding: 5px 10px; margin-bottom: 10px; font-size: 11px; background: rgba(255,255,255,0.03); }
        #vault { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; align-items: center; justify-content: center; padding: 15px; }
        input::placeholder { color: rgba(0, 242, 255, 0.3); }
    </style>
</head>
<body>

    <header class="text-center py-4 shrink-0">
        <h1 class="text-3xl font-black italic neon-glow uppercase">T JOHN V11.1</h1>
        <div class="text-[9px] tracking-[0.4em] text-cyan-300 font-bold">FULL SDK + JINA READER | FOUNDER: T THUẬN</div>
    </header>

    <main class="flex-grow overflow-hidden px-4">
        <div id="terminal" class="h-full overflow-y-auto p-2">
            <div id="logs">
                <div class="log-entry text-white/40">[HỆ THỐNG]: Đã khôi phục Jina Reader API...</div>
                <div class="log-entry text-cyan-400 font-bold">[T JOHN]: Đã sẵn sàng. Hãy kiểm tra 3 Key trong phần cài đặt ⚙️.</div>
            </div>
        </div>
    </main>

    <footer class="p-4 glass shrink-0 border-t border-cyan-900/50">
        <div class="flex gap-4 max-w-4xl mx-auto mb-3 justify-center">
            <button onclick="window.copyCode()" class="text-[10px] uppercase font-bold text-cyan-500">Copy Code</button>
            <button onclick="window.downloadApp()" class="text-[10px] uppercase font-bold text-cyan-500">Tải App</button>
        </div>
        <div class="flex gap-2 max-w-4xl mx-auto">
            <input type="text" id="userInput" placeholder="Nhập lệnh..." class="flex-grow bg-black/60 border border-cyan-900 p-4 rounded-2xl text-white outline-none focus:border-cyan-400">
            <button id="sendBtn" class="bg-cyan-500 text-black px-6 rounded-2xl font-black">GỬI</button>
            <button onclick="window.toggleVault()" class="px-4 rounded-2xl border border-cyan-900 bg-black/40 text-xl">⚙️</button>
        </div>
    </footer>

    <div id="vault">
        <div class="w-full max-w-sm glass p-8 rounded-3xl border-2 border-cyan-400 shadow-[0_0_50px_rgba(0,242,255,0.15)]">
            <h2 class="text-xl font-bold mb-6 text-center neon-glow uppercase italic">Trung Tâm Chìa Khóa</h2>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] uppercase font-bold text-cyan-500 ml-1">1. Gemini API Key (Bắt buộc)</label>
                    <input type="text" id="key-gemini" placeholder="Dán Gemini Key tại đây..." class="w-full bg-zinc-900 p-3 rounded-xl text-yellow-400 text-xs border border-zinc-800 outline-none">
                </div>
                <div>
                    <label class="text-[10px] uppercase font-bold text-yellow-500 ml-1">2. Jina Reader API Key</label>
                    <input type="text" id="key-jina" placeholder="Dán Jina Key tại đây..." class="w-full bg-zinc-900 p-3 rounded-xl text-yellow-400 text-xs border border-zinc-800 outline-none">
                </div>
                <div>
                    <label class="text-[10px] uppercase font-bold text-gray-500 ml-1">3. GitHub Token (ghp_...)</label>
                    <input type="text" id="key-github" placeholder="Dán GitHub Token tại đây..." class="w-full bg-zinc-900 p-3 rounded-xl text-yellow-400 text-xs border border-zinc-800 outline-none">
                </div>
                <button onclick="window.saveVault()" class="w-full bg-cyan-600 py-4 rounded-xl font-black text-black uppercase mt-4">KÍCH HOẠT TOÀN BỘ HỆ THỐNG</button>
            </div>
            <button onclick="window.toggleVault()" class="w-full mt-6 text-[10px] opacity-40 uppercase underline">Đóng</button>
        </div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        window.lastCode = "";

        window.onload = () => {
            document.getElementById('key-gemini').value = localStorage.getItem('gemini_key') || "";
            document.getElementById('key-jina').value = localStorage.getItem('jina_key') || "";
            document.getElementById('key-github').value = localStorage.getItem('github_key') || "";
        };

        window.toggleVault = () => {
            const v = document.getElementById('vault');
            v.style.display = (v.style.display === 'flex') ? 'none' : 'flex';
        };

        window.saveVault = () => {
            localStorage.setItem('gemini_key', document.getElementById('key-gemini').value.trim());
            localStorage.setItem('jina_key', document.getElementById('key-jina').value.trim());
            localStorage.setItem('github_key', document.getElementById('key-github').value.trim());
            alert("HỆ THỐNG: Đã ghi nhớ và đồng bộ 3 chìa khóa!");
            location.reload();
        };

        async function startAI() {
            const input = document.getElementById('userInput');
            const prompt = input.value;
            if(!prompt) return;

            window.log(prompt, "success");
            input.value = "";

            const apiKey = localStorage.getItem('gemini_key');
            if(!apiKey) return window.log("LỖI: Hãy nhấn ⚙️ để nạp Gemini Key!", "error");

            window.log("Đang kết nối SDK...", "info");

            try {
                const genAI = new GoogleGenerativeAI(apiKey);
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

                const result = await model.generateContent(`Founder: T Thuận. Bạn là T John AI. Luôn viết code đầy đủ. Yêu cầu: ${prompt}`);
                const response = await result.response;
                const text = response.text();

                const match = text.match(/```html([\s\S]*?)```/);
                if(match) window.lastCode = match[1];

                window.log(text.replace(/```[\s\S]*?```/g, "[MÃ NGUỒN]"), "ai");
            } catch (err) {
                window.log("SỰ CỐ SDK: " + err.message, "error");
            }
        }

        window.log = (msg, type) => {
            const logs = document.getElementById('logs');
            const div = document.createElement('div');
            const colors = { error: 'text-red-500 font-bold', success: 'text-green-400', info: 'text-cyan-400', ai: 'text-white italic' };
            div.className = `log-entry ${colors[type] || ''}`;
            div.innerHTML = `> ${msg}`;
            logs.appendChild(div);
            document.getElementById('terminal').scrollTop = document.getElementById('terminal').scrollHeight;
        };

        window.copyCode = () => { if(window.lastCode) { navigator.clipboard.writeText(window.lastCode); alert("Đã copy!"); } };
        window.downloadApp = () => { if(window.lastCode) { const blob = new Blob([window.lastCode], {type: 'text/html'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `T-JOHN-APP.html`; a.click(); } };

        document.getElementById('sendBtn').onclick = startAI;
    </script>
</body>
</html>
