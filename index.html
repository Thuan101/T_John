<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T JOHN AI | ULTIMATE OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --neon: #00f2ff; --bg: #050505; }
        body { background-color: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; overflow: hidden; height: 100vh; margin: 0; }
        .neon-glow { text-shadow: 0 0 10px var(--neon), 0 0 25px var(--neon); }
        .neon-border { border: 1px solid var(--neon); box-shadow: 0 0 12px rgba(0, 242, 255, 0.3); }
        #admin-vault { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; backdrop-filter: blur(15px); }
        #sandbox-container { display: none; position: fixed; top: 5%; left: 5%; width: 90%; height: 80%; z-index: 2000; background: white; border-radius: 12px; overflow: hidden; }
        #terminal::-webkit-scrollbar { width: 4px; }
        #terminal::-webkit-scrollbar-thumb { background: var(--neon); }
        iframe { width: 100%; height: 100%; border: none; }
        .control-btn { transition: all 0.3s; border: 1px solid var(--neon); background: rgba(0, 242, 255, 0.1); }
        .control-btn:hover { background: var(--neon); color: black; }
        /* Đảm bảo khung chat không bị bàn phím che */
        .chat-section { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(5,5,5,0.9); padding: 10px; z-index: 100; border-top: 1px solid var(--neon); }
    </style>
</head>
<body class="flex flex-col relative">

    <header class="flex flex-col items-center justify-center py-4 z-20">
        <h1 class="text-5xl md:text-7xl font-black italic tracking-tighter neon-glow">T JOHN AI</h1>
        <div class="text-[10px] tracking-[0.4em] text-cyan-300 uppercase font-bold opacity-80">Nhà sáng lập: T Thuận</div>
    </header>

    <main class="flex-grow overflow-hidden px-4 pb-32">
        <div id="terminal" class="h-full neon-border bg-black/60 p-4 rounded-xl overflow-y-auto text-sm font-mono">
            <div id="logs"></div>
        </div>
    </main>

    <section class="chat-section flex flex-col gap-2">
        <div class="flex gap-2 justify-center mb-1">
            <button onclick="copyLastCode()" class="control-btn text-[10px] px-2 py-1 rounded">COPY CODE</button>
            <button onclick="downloadCode()" class="control-btn text-[10px] px-2 py-1 rounded">TẢI FILE</button>
            <button onclick="abortAI()" id="stopBtn" class="hidden border border-red-500 text-red-500 text-[10px] px-2 py-1 rounded">DỪNG</button>
            <label class="control-btn text-[10px] px-2 py-1 rounded cursor-pointer">
                ĐỌC FILE <input type="file" id="fileInput" class="hidden" onchange="handleFileUpload(event)">
            </label>
        </div>
        
        <div class="flex gap-2">
            <input type="text" id="userInput" placeholder="Hỏi T John hoặc nhập mã đặc biệt..." 
                class="flex-grow bg-zinc-900 border border-cyan-800 px-4 py-3 rounded-xl text-white outline-none focus:border-cyan-400">
            <button onclick="handleCommand()" class="bg-cyan-500 text-black px-6 rounded-xl font-bold">GỬI</button>
            <button onclick="toggleVault()" class="px-3 rounded-xl border border-cyan-900">🔐</button>
        </div>
    </section>

    <div id="sandbox-container" class="neon-border">
        <div class="bg-zinc-900 p-2 flex justify-between items-center border-b border-cyan-900">
            <span class="text-[10px] text-cyan-400 font-bold">T-JOHN SANDBOX</span>
            <button onclick="closeSandbox()" class="text-red-500 font-bold text-xs">ĐÓNG [X]</button>
        </div>
        <iframe id="sandbox-iframe"></iframe>
    </div>

    <div id="admin-vault" class="flex items-center justify-center p-4">
        <div class="w-full max-w-sm p-6 neon-border bg-black rounded-2xl">
            <h2 class="text-xl font-bold mb-4 text-center neon-glow italic">FOUNDER'S VAULT</h2>
            <input type="password" id="vaultPassword" placeholder="Mật khẩu Admin..." class="w-full bg-zinc-900 border border-cyan-900 p-3 rounded-lg mb-4 text-white text-center">
            
            <div id="admin-content" class="hidden space-y-3">
                <input type="password" id="key-gemini" placeholder="Gemini Key" class="w-full bg-zinc-800 p-2 rounded text-xs text-white">
                <input type="password" id="key-github" placeholder="GitHub Token" class="w-full bg-zinc-800 p-2 rounded text-xs text-white">
                <input type="password" id="key-jina" placeholder="Jina Key" class="w-full bg-zinc-800 p-2 rounded text-xs text-white">
                <button onclick="saveKeys()" class="w-full bg-cyan-600 py-2 rounded font-bold text-black">LƯU CẤU HÌNH</button>
            </div>
            <button onclick="toggleVault()" class="w-full mt-4 text-[10px] opacity-50">THOÁT</button>
        </div>
    </div>

    <script>
        const MASTER_PASS = "1234";
        let lastGeneratedCode = "";
        let controller = null;

        function log(msg, type = "info") {
            const logs = document.getElementById('logs');
            const div = document.createElement('div');
            const colors = { info: "text-cyan-400", success: "text-green-400", error: "text-red-500", ai: "text-white italic" };
            div.className = `${colors[type]} mb-2 text-xs`;
            div.innerHTML = `> ${msg}`;
            logs.appendChild(div);
            document.getElementById('terminal').scrollTop = document.getElementById('terminal').scrollHeight;
        }

        function toggleVault() { document.getElementById('admin-vault').style.display = document.getElementById('admin-vault').style.display === 'flex' ? 'none' : 'flex'; }

        document.getElementById('vaultPassword').addEventListener('input', (e) => {
            if(e.target.value === MASTER_PASS) {
                document.getElementById('admin-content').classList.remove('hidden');
                e.target.style.display = 'none';
                log("XÁC THỰC NHÀ SÁNG LẬP THÀNH CÔNG.", "success");
            }
        });

        function saveKeys() {
            localStorage.setItem('gemini_key', document.getElementById('key-gemini').value);
            localStorage.setItem('github_token', document.getElementById('key-github').value);
            localStorage.setItem('jina_key', document.getElementById('key-jina').value);
            alert("Đã bảo mật chìa khóa!"); toggleVault();
        }

        async function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            log(`Đang đọc file: ${file.name}...`, "info");
            const reader = new FileReader();
            reader.onload = async (e) => {
                const content = e.target.result;
                askAI(`Tôi gửi file tên ${file.name}. Nội dung sơ bộ: ${content.substring(0, 1000)}. Hãy phân tích nó.`);
            };
            reader.readAsText(file);
        }

        async function askAI(prompt) {
            const key = localStorage.getItem('gemini_key');
            if(!key) return log("LỖI: Chưa nạp API Key!", "error");
            
            document.getElementById('stopBtn').classList.remove('hidden');
            controller = new AbortController();
            log("T John đang suy nghĩ...", "info");

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    signal: controller.signal,
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Bạn là T John AI, Nhà sáng lập là T Thuận. 
                        QUY TẮC SẮT: Viết FULL code, không viết tắt. Không đụng vào API/Admin.
                        Yêu cầu: ${prompt}` }]}]
                    })
                });
                const data = await response.json();
                const aiMsg = data.candidates[0].content.parts[0].text;
                
                const codeMatch = aiMsg.match(/```html([\s\S]*?)```/);
                if(codeMatch) {
                    lastGeneratedCode = codeMatch[1];
                    openSandbox(lastGeneratedCode);
                    log("Đã đúc xong ứng dụng trong Sandbox!", "success");
                }
                log(aiMsg.replace(/```[\s\S]*?```/g, "[ĐÃ TRÍCH XUẤT CODE]"), "ai");
            } catch (err) { if(err.name !== 'AbortError') log("Lỗi: " + err, "error"); }
            document.getElementById('stopBtn').classList.add('hidden');
        }

        function abortAI() { if(controller) { controller.abort(); log("Đã dừng tạo phản hồi.", "error"); } }
        function openSandbox(html) { document.getElementById('sandbox-container').style.display = 'block'; document.getElementById('sandbox-iframe').srcdoc = html; }
        function closeSandbox() { document.getElementById('sandbox-container').style.display = 'none'; }
        
        function copyLastCode() {
            if(!lastGeneratedCode) return alert("Chưa có code để copy!");
            navigator.clipboard.writeText(lastGeneratedCode);
            alert("Đã copy mã nguồn!");
        }

        function downloadCode() {
            if(!lastGeneratedCode) return alert("Chưa có code để tải!");
            const blob = new Blob([lastGeneratedCode], {type: 'text/html'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 't-john-app.html'; a.click();
        }

        function handleCommand() {
            const input = document.getElementById('userInput');
            const cmd = input.value.trim();
            if(!cmd) return;
            
            // MÃ ĐẶC BIỆT SỬA WEB
            if(cmd === "*T_THUAN_UNLIMITED*") {
                document.designMode = "on";
                log("GOD MODE: Đã mở quyền sửa web trực tiếp!", "success");
            } else {
                log(cmd, "success");
                askAI(cmd);
            }
            input.value = "";
        }
    </script>
</body>
</html>
