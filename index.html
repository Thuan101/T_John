<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T JOHN AI | ULTIMATE OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --neon: #00f2ff; --bg-overlay: rgba(5, 5, 5, 0.7); }
        
        body { 
            background: url('https://raw.githubusercontent.com/Thuan101/T-John-Ai/main/1000181678.jpg') no-repeat center center fixed; 
            background-size: cover;
            color: var(--neon); 
            font-family: 'Courier New', monospace; 
            overflow: hidden; 
            height: 100vh; 
            margin: 0; 
        }

        .neon-glow { text-shadow: 0 0 10px var(--neon), 0 0 20px var(--neon); }
        .neon-border { border: 1px solid var(--neon); box-shadow: 0 0 15px rgba(0, 242, 255, 0.3); }
        
        /* Glassmorphism hiệu ứng kính mờ */
        .glass { background: var(--bg-overlay); backdrop-filter: blur(10px); border: 1px solid rgba(0, 242, 255, 0.2); }
        
        #terminal { scroll-behavior: smooth; }
        #admin-vault { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; backdrop-filter: blur(20px); }
        #sandbox-area { display: none; position: fixed; top: 10%; left: 5%; width: 90%; height: 80%; z-index: 4000; background: white; border-radius: 12px; overflow: hidden; }
        
        .control-btn { 
            background: rgba(0, 242, 255, 0.1); 
            border: 1px solid var(--neon); 
            color: var(--neon); 
            font-size: 10px; 
            padding: 4px 10px; 
            border-radius: 4px;
            transition: all 0.2s;
        }
        .control-btn:hover { background: var(--neon); color: black; font-weight: bold; }
        
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body class="flex flex-col relative">

    <header class="flex flex-col items-center justify-center py-4 z-10">
        <h1 class="text-4xl md:text-5xl font-black italic tracking-tighter neon-glow uppercase">T JOHN AI</h1>
        <div class="text-[9px] tracking-[0.4em] text-cyan-300 font-bold opacity-80 mt-1 uppercase">Nhà sáng lập: T Thuận</div>
    </header>

    <main class="flex-grow px-4 pb-48 overflow-hidden z-10">
        <div id="terminal" class="h-full glass p-4 rounded-xl overflow-y-auto text-xs leading-relaxed neon-border">
            <div id="logs" class="space-y-2">
                <div class="text-white/50">[HỆ THỐNG]: Đã kết nối không gian Hố Đen...</div>
                <div class="text-cyan-400 font-bold">[T JOHN]: Đang chờ lệnh từ Nhà sáng lập T Thuận.</div>
            </div>
        </div>
    </main>

    <section class="fixed bottom-0 left-0 w-full glass p-4 border-t border-cyan-500/30 z-20">
        <div class="flex flex-wrap gap-2 justify-center mb-3">
            <button onclick="copyLastCode()" class="control-btn uppercase">Copy Code</button>
            <button onclick="downloadApp()" class="control-btn uppercase">Tải File</button>
            <label class="control-btn uppercase cursor-pointer">
                Nạp File <input type="file" class="hidden" onchange="handleFile(event)">
            </label>
            <button onclick="abortMission()" id="stopBtn" class="hidden border-red-500 text-red-500 control-btn">DỪNG LỆNH</button>
        </div>
        
        <div class="flex gap-2 max-w-4xl mx-auto">
            <input type="text" id="userInput" autocomplete="off" placeholder="Hỏi T John hoặc nhập mã đặc biệt..." 
                class="flex-grow bg-black/50 border border-cyan-900 p-3 rounded-xl text-white outline-none focus:border-cyan-400 text-sm">
            <button onclick="execute()" class="bg-cyan-500 text-black px-6 rounded-xl font-black shadow-lg active:scale-95 transition-transform">GỬI</button>
            <button onclick="toggleVault()" class="px-3 rounded-xl border border-cyan-900 bg-black/40">🔐</button>
        </div>
    </section>

    <div id="admin-vault" class="flex items-center justify-center p-4">
        <div class="w-full max-w-md p-8 neon-border glass rounded-3xl text-center">
            <h2 class="text-2xl font-bold mb-6 italic neon-glow">PHÒNG ĐIỀU HÀNH</h2>
            <input type="password" id="vaultPass" placeholder="Mật mã Admin..." 
                class="w-full bg-zinc-900 border border-cyan-900 p-4 rounded-xl mb-4 text-white text-center outline-none">
            
            <div id="vault-content" class="hidden space-y-4 text-left">
                <div>
                    <label class="text-[9px] text-cyan-500 ml-1 font-bold">GEMINI API KEY</label>
                    <input type="password" id="key-gemini" class="w-full bg-zinc-800 p-3 rounded-lg text-xs text-white border border-zinc-700">
                </div>
                <div>
                    <label class="text-[9px] text-cyan-500 ml-1 font-bold">GITHUB TOKEN</label>
                    <input type="password" id="key-github" class="w-full bg-zinc-800 p-3 rounded-lg text-xs text-white border border-zinc-700">
                </div>
                <button onclick="secureSave()" class="w-full bg-cyan-600 py-4 rounded-xl font-black text-black uppercase shadow-lg hover:bg-cyan-400">KÍCH HOẠT HẠT NHÂN</button>
            </div>
            <button onclick="toggleVault()" class="mt-8 text-[10px] opacity-50 underline">Thoát</button>
        </div>
    </div>

    <div id="sandbox-area" class="neon-border">
        <div class="bg-zinc-900 p-2 flex justify-between items-center text-white border-b border-cyan-900">
            <span class="text-[10px] font-bold text-cyan-400 ml-2 uppercase">Virtual Sandbox OS</span>
            <button onclick="closeSandbox()" class="text-red-500 font-black px-2 hover:bg-red-500/20">ĐÓNG [X]</button>
        </div>
        <iframe id="sandbox-iframe"></iframe>
    </div>

    <script>
        const ADMIN_HASH = "ADMIN_T.JOHN.AI_Q.Thuan:7329000";
        const GOD_CODE = "#DESIGN_T.JOHN.AI_NOW";
        let controller = null, lastCode = "";

        const vaultSecret = {
            encode: (str) => btoa(encodeURIComponent(str)),
            decode: (str) => {
                if(!str) return null;
                try { return decodeURIComponent(atob(str)); } catch(e) { return str; }
            }
        };

        function toggleVault() {
            const v = document.getElementById('admin-vault');
            v.style.display = v.style.display === 'flex' ? 'none' : 'flex';
        }

        document.getElementById('vaultPass').addEventListener('input', (e) => {
            if(e.target.value === ADMIN_HASH) {
                document.getElementById('vault-content').classList.remove('hidden');
                e.target.style.display = 'none';
                log("XÁC THỰC NHÀ SÁNG LẬP THÀNH CÔNG.", "success");
            }
        });

        function secureSave() {
            const g = document.getElementById('key-gemini').value;
            localStorage.setItem('_tj_g', vaultSecret.encode(g));
            log("Dữ liệu hạt nhân đã được niêm phong.", "success");
            toggleVault();
        }

        async function askAI(prompt, base64File = null) {
            const gKey = vaultSecret.decode(localStorage.getItem('_tj_g'));
            if(!gKey) return log("Lỗi: Chưa có chìa khóa API trong Vault!", "error");

            controller = new AbortController();
            document.getElementById('stopBtn').classList.remove('hidden');
            log("T John đang suy nghĩ...", "info");

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${gKey}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    signal: controller.signal,
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Tôi là T John AI, phục vụ Nhà sáng lập T Thuận. Luôn viết code hoàn chỉnh không placeholder. Yêu cầu: ${prompt}` }]}]
                    })
                });

                const data = await response.json();
                const text = data.candidates[0].content.parts[0].text;
                const codeMatch = text.match(/```html([\s\S]*?)```/);
                
                if(codeMatch) {
                    lastCode = codeMatch[1];
                    document.getElementById('sandbox-area').style.display = 'block';
                    document.getElementById('sandbox-iframe').srcdoc = lastCode;
                    log("Đã kích hoạt Sandbox để chạy ứng dụng mới.", "success");
                }
                log(text.replace(/```[\s\S]*?```/g, "[MÃ NGUỒN]"), "ai");
            } catch (err) {
                if(err.name !== 'AbortError') log("Lỗi: " + err.message, "error");
            }
            document.getElementById('stopBtn').classList.add('hidden');
        }

        function execute() {
            const input = document.getElementById('userInput');
            const val = input.value.trim();
            if(!val) return;
            if(val === GOD_CODE) {
                document.designMode = "on";
                log("GOD MODE: Đã mở khóa quyền năng chỉnh sửa web!", "success");
            } else {
                log(val, "success");
                askAI(val);
            }
            input.value = "";
        }

        function log(msg, type) {
            const logs = document.getElementById('logs');
            const d = document.createElement('div');
            const colors = { success: 'text-green-400', error: 'text-red-500', ai: 'text-white italic', info: 'text-yellow-400' };
            d.className = `${colors[type] || 'text-cyan-400'} border-l-2 border-current pl-2`;
            d.innerHTML = `> ${msg}`;
            logs.appendChild(d);
            document.getElementById('terminal').scrollTop = document.getElementById('terminal').scrollHeight;
        }

        function copyLastCode() {
            if(!lastCode) return alert("Chưa có code!");
            navigator.clipboard.writeText(lastCode);
            log("Đã copy mã nguồn vào bộ nhớ tạm.", "info");
        }

        function downloadApp() {
            if(!lastCode) return;
            const blob = new Blob([lastCode], {type: 'text/html'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `T-JOHN-APP-${Date.now()}.html`;
            a.click();
        }

        function handleFile(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                const base64 = ev.target.result.split(',')[1];
                askAI(`Phân tích file ${file.name}`, base64);
            };
            reader.readAsDataURL(file);
        }

        function abortMission() { if(controller) controller.abort(); }
        function closeSandbox() { document.getElementById('sandbox-area').style.display = 'none'; }
    </script>
</body>
</html>
