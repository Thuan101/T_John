<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T JOHN V13 | AGENT MODE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
      {
        "imports": {
          "@google/generative-ai": "https://esm.run/@google/generative-ai"
        }
      }
    </script>
    <style>
        :root { --neon: #00f2ff; --bg: #050505; }
        body { 
            background: var(--bg) url('https://raw.githubusercontent.com/Thuan101/T-John-Ai/main/1000181678.jpg') no-repeat center center fixed; 
            background-size: cover; color: var(--neon); font-family: 'Courier New', monospace; 
            height: 100vh; margin: 0; overflow: hidden; display: flex; flex-direction: column;
        }
        .neon-glow { text-shadow: 0 0 10px var(--neon), 0 0 20px var(--neon); }
        .glass { background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(0, 242, 255, 0.3); }
        .log-entry { border-left: 2px solid var(--neon); padding: 5px 10px; margin-bottom: 10px; font-size: 11px; background: rgba(255,255,255,0.03); }
        #vault { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; align-items: center; justify-content: center; padding: 15px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>

    <header class="text-center py-4 shrink-0">
        <h1 class="text-3xl font-black italic neon-glow uppercase">T JOHN V13</h1>
        <div class="text-[9px] tracking-[0.4em] text-cyan-300 font-bold uppercase">ADVANCED AGENT CORE (CLAW STYLE)</div>
    </header>

    <main class="flex-grow overflow-hidden px-4">
        <div id="terminal" class="h-full overflow-y-auto p-2 custom-scroll">
            <div id="logs">
                <div class="log-entry text-white/40">[HỆ THỐNG]: Agent Mode đã kích hoạt. Sẵn sàng đọc link và thực thi lệnh phức tạp.</div>
            </div>
        </div>
    </main>

    <footer class="p-4 glass shrink-0 border-t border-cyan-900/50">
        <div class="flex gap-2 max-w-4xl mx-auto mb-2">
            <div id="status" class="text-[10px] text-cyan-500 uppercase font-bold">
                <span class="status-dot bg-green-500 animate-pulse"></span> Hệ thống ổn định
            </div>
        </div>
        <div class="flex gap-2 max-w-4xl mx-auto">
            <input type="text" id="userInput" placeholder="Gửi lệnh hoặc link web (https://...)" class="flex-grow bg-black/60 border border-cyan-900 p-4 rounded-2xl text-white outline-none focus:border-cyan-400">
            <button id="sendBtn" class="bg-cyan-500 text-black px-6 rounded-2xl font-black hover:bg-white">GỬI</button>
            <button onclick="window.toggleVault()" class="px-4 rounded-2xl border border-cyan-900 bg-black/40 text-xl">⚙️</button>
        </div>
    </footer>

    <div id="vault">
        <div class="w-full max-w-sm glass p-8 rounded-3xl border-2 border-cyan-400">
            <h2 class="text-xl font-bold mb-6 text-center neon-glow uppercase italic">Agent Config</h2>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] uppercase font-bold text-cyan-500 ml-1">Gemini API Key</label>
                    <input type="text" id="key-gemini" class="w-full bg-zinc-900 p-3 rounded-xl text-yellow-400 text-xs border border-zinc-800 outline-none">
                </div>
                <div>
                    <label class="text-[10px] uppercase font-bold text-yellow-500 ml-1">Jina Reader Key (Dùng để đọc web)</label>
                    <input type="text" id="key-jina" class="w-full bg-zinc-900 p-3 rounded-xl text-yellow-400 text-xs border border-zinc-800 outline-none">
                </div>
                <button onclick="window.saveVault()" class="w-full bg-cyan-600 py-4 rounded-xl font-black text-black uppercase mt-4">KÍCH HOẠT AGENT</button>
            </div>
            <button onclick="window.toggleVault()" class="w-full mt-6 text-[10px] opacity-40 uppercase underline text-center block">Đóng</button>
        </div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        window.lastCode = "";

        window.onload = () => {
            document.getElementById('key-gemini').value = localStorage.getItem('gemini_key') || "";
            document.getElementById('key-jina').value = localStorage.getItem('jina_key') || "";
        };

        window.toggleVault = () => {
            const v = document.getElementById('vault');
            v.style.display = (v.style.display === 'flex') ? 'none' : 'flex';
        };

        window.saveVault = () => {
            localStorage.setItem('gemini_key', document.getElementById('key-gemini').value.trim());
            localStorage.setItem('jina_key', document.getElementById('key-jina').value.trim());
            alert("Cấu hình Agent đã cập nhật!");
            location.reload();
        };

        async function readWeb(url) {
            const jinaKey = localStorage.getItem('jina_key');
            window.log(`Đang đọc nội dung từ: ${url}...`, "info");
            try {
                const response = await fetch(`https://r.jina.ai/${url}`, {
                    headers: { "Authorization": `Bearer ${jinaKey}` }
                });
                return await response.text();
            } catch (e) {
                return "Không thể đọc nội dung web này.";
            }
        }

        async function startAI() {
            const input = document.getElementById('userInput');
            let prompt = input.value.trim();
            if(!prompt) return;

            window.log(prompt, "success");
            input.value = "";

            const geminiKey = localStorage.getItem('gemini_key');
            if(!geminiKey) return window.log("LỖI: Thiếu Gemini Key!", "error");

            let webContent = "";
            const urlMatch = prompt.match(/https?:\/\/[^\s]+/);
            if(urlMatch) {
                webContent = await readWeb(urlMatch[0]);
                prompt = `Nội dung web: ${webContent}\n\nYêu cầu: ${prompt}`;
            }

            try {
                const genAI = new GoogleGenerativeAI(geminiKey);
                const model = genAI.getGenerativeModel({ 
                    model: "gemini-1.5-flash",
                    systemInstruction: "Bạn là T John AI, một Agent mạnh mẽ có khả năng lập trình và phân tích dữ liệu chuyên sâu giống Open Claw. Luôn ưu tiên trả về giải pháp thực thi được và code HTML hoàn chỉnh."
                }, { apiVersion: 'v1' });

                const result = await model.generateContent(prompt);
                const response = await result.response;
                const text = response.text();

                const match = text.match(/```html([\s\S]*?)```/);
                if(match) window.lastCode = match[1];

                window.log(text.replace(/```[\s\S]*?```/g, "[AGENT CODE EXECUTED]"), "ai");

            } catch (err) {
                window.log("AGENT ERROR: " + err.message, "error");
            }
        }

        window.log = (msg, type) => {
            const logs = document.getElementById('logs');
            const div = document.createElement('div');
            const colors = { error: 'text-red-500', success: 'text-green-400', info: 'text-cyan-400/60', ai: 'text-white italic' };
            div.className = `log-entry ${colors[type] || ''}`;
            div.innerHTML = `> ${msg}`;
            logs.appendChild(div);
            document.getElementById('terminal').scrollTop = document.getElementById('terminal').scrollHeight;
        };

        document.getElementById('sendBtn').onclick = startAI;
    </script>
</body>
</html>
