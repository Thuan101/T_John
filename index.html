<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T JOHN AI | OS VERSION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --neon: #00f2ff; --bg: #050505; }
        body { background-color: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; overflow: hidden; height: 100vh; margin: 0; }
        .neon-glow { text-shadow: 0 0 10px var(--neon), 0 0 25px var(--neon); }
        .neon-border { border: 1px solid var(--neon); box-shadow: 0 0 12px rgba(0, 242, 255, 0.3); }
        #admin-vault { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; backdrop-filter: blur(15px); }
        #sandbox-container { display: none; position: fixed; top: 5%; left: 5%; width: 90%; height: 90%; z-index: 50; background: white; border-radius: 12px; overflow: hidden; }
        #terminal::-webkit-scrollbar { width: 4px; }
        #terminal::-webkit-scrollbar-thumb { background: var(--neon); }
        iframe { width: 100%; height: 100%; border: none; }
        .scanline { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, transparent 50%, rgba(0, 242, 255, 0.05) 50%); background-size: 100% 4px; pointer-events: none; z-index: 10; }
    </style>
</head>
<body class="flex flex-col p-4 relative">
    <div class="scanline"></div>

    <header class="flex flex-col items-center justify-center py-6 z-20">
        <h1 class="text-6xl md:text-7xl font-black italic tracking-tighter neon-glow" style="font-family: 'Arial Black', sans-serif;">T JOHN AI</h1>
        <div class="text-sm tracking-[0.4em] text-cyan-300 uppercase mt-2 font-bold opacity-80">Nhà sáng lập: T Thuận</div>
        <div class="w-48 h-[1px] bg-cyan-500 mt-3 shadow-[0_0_15px_#00f2ff]"></div>
    </header>

    <main class="flex-grow flex flex-col gap-4 overflow-hidden z-20">
        <div id="terminal" class="flex-grow neon-border bg-black/60 p-5 rounded-xl overflow-y-auto text-sm font-mono leading-relaxed">
            <div class="text-cyan-500/50">[HỆ THỐNG]: OS Version 1.0 khởi động thành công...</div>
            <div class="text-cyan-500/50">[HỆ THỐNG]: Chào mừng Nhà sáng lập T Thuận.</div>
            <div id="logs"></div>
        </div>

        <div class="h-16 flex gap-3">
            <input type="text" id="userInput" placeholder="Gõ yêu cầu tạo công cụ, web, hoặc lệnh..." 
                class="flex-grow bg-black/40 neon-border px-5 py-3 rounded-xl outline-none focus:bg-cyan-950/30 transition-all text-white border-cyan-800">
            <button onclick="handleCommand()" class="neon-border bg-cyan-900/40 px-8 rounded-xl font-bold hover:bg-cyan-400 hover:text-black transition-all">GỬI</button>
            <button onclick="toggleVault()" class="neon-border px-4 rounded-xl hover:bg-cyan-400">🔐</button>
        </div>
    </main>

    <div id="sandbox-container" class="neon-border">
        <div class="bg-zinc-900 p-3 flex justify-between items-center text-white border-b border-cyan-900">
            <span class="text-xs font-bold tracking-widest text-cyan-400">T-JOHN AI SANDBOX AREA</span>
            <button onclick="closeSandbox()" class="bg-red-600 px-3 py-1 rounded text-[10px] hover:bg-red-500 transition-all">ĐÓNG [X]</button>
        </div>
        <iframe id="sandbox-iframe"></iframe>
    </div>

    <div id="admin-vault" class="flex items-center justify-center">
        <div class="w-full max-w-md p-8 neon-border bg-black rounded-3xl text-center">
            <h2 class="text-3xl font-black mb-8 italic neon-glow">ADMIN VAULT</h2>
            <input type="password" id="vaultPassword" placeholder="Mật khẩu Admin..." 
                class="w-full bg-zinc-900 border border-cyan-900 p-4 rounded-xl mb-6 outline-none text-white text-center text-xl">
            
            <div id="admin-content" class="hidden text-left space-y-4">
                <div>
                    <label class="text-[10px] text-cyan-500 font-bold uppercase ml-1">Gemini API Key</label>
                    <input type="password" id="key-gemini" class="w-full bg-zinc-900 border border-zinc-800 p-3 rounded-lg text-white text-xs mt-1">
                </div>
                <div>
                    <label class="text-[10px] text-cyan-500 font-bold uppercase ml-1">GitHub Token (ghp_...)</label>
                    <input type="password" id="key-github" class="w-full bg-zinc-900 border border-zinc-800 p-3 rounded-lg text-white text-xs mt-1">
                </div>
                <div>
                    <label class="text-[10px] text-cyan-500 font-bold uppercase ml-1">Jina API Key (jina_...)</label>
                    <input type="password" id="key-jina" class="w-full bg-zinc-900 border border-zinc-800 p-3 rounded-lg text-white text-xs mt-1">
                </div>
                <button onclick="saveKeys()" class="w-full bg-cyan-500 text-black font-black py-4 rounded-xl mt-4 hover:bg-white transition-all shadow-lg">LƯU CẤU HÌNH HẠT NHÂN</button>
            </div>
            <button onclick="toggleVault()" class="mt-10 text-xs opacity-40 hover:opacity-100 underline">Đóng quyền truy cập</button>
        </div>
    </div>

    <script>
        const MASTER_PASS = "1234"; 

        function log(msg, type = "info") {
            const logs = document.getElementById('logs');
            const div = document.createElement('div');
            const colors = { info: "text-cyan-400", success: "text-green-400", error: "text-red-500", ai: "text-white font-sans italic" };
            div.className = `${colors[type] || "text-white"} mb-2 animate-pulse`;
            div.innerHTML = `<span class="opacity-30"># </span>${msg}`;
            logs.appendChild(div);
            document.getElementById('terminal').scrollTop = document.getElementById('terminal').scrollHeight;
        }

        function toggleVault() {
            const vault = document.getElementById('admin-vault');
            vault.style.display = vault.style.display === 'flex' ? 'none' : 'flex';
        }

        document.getElementById('vaultPassword').addEventListener('input', (e) => {
            if(e.target.value === MASTER_PASS) {
                document.getElementById('admin-content').classList.remove('hidden');
                e.target.style.display = 'none';
                log("XÁC THỰC ADMIN THÀNH CÔNG.", "success");
            }
        });

        function saveKeys() {
            localStorage.setItem('gemini_key', document.getElementById('key-gemini').value);
            localStorage.setItem('github_token', document.getElementById('key-github').value);
            localStorage.setItem('jina_key', document.getElementById('key-jina').value);
            alert("Đã kích hoạt các chìa khóa hệ thống!");
            toggleVault();
        }

        function openSandbox(htmlCode) {
            document.getElementById('sandbox-container').style.display = 'block';
            document.getElementById('sandbox-iframe').srcdoc = htmlCode;
        }

        function closeSandbox() { document.getElementById('sandbox-container').style.display = 'none'; }

        // BỘ NÃO GEMINI XỬ LÝ
        async function askAI(prompt) {
            const key = localStorage.getItem('gemini_key');
            if(!key) return log("LỖI: Chưa có Gemini API Key!", "error");

            log("T John AI đang xử lý yêu cầu...", "info");
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Bạn là T John AI, được sáng lập bởi T Thuận. 
                        QUY TẮC: Luôn viết code FULL (không viết tắt), luôn lịch sự với T Thuận.
                        Yêu cầu hiện tại: ${prompt}` }]}]
                    })
                });
                const data = await response.json();
                const aiResponse = data.candidates[0].content.parts[0].text;
                
                // Trích xuất code nếu có
                const codeMatch = aiResponse.match(/```html([\s\S]*?)```/);
                if(codeMatch) {
                    log("Đã phát hiện ứng dụng mới. Đang khởi tạo Sandbox...", "success");
                    openSandbox(codeMatch[1]);
                }
                log(aiResponse.replace(/```[\s\S]*?```/g, "[ĐÃ TRÍCH XUẤT CODE]"), "ai");
            } catch (err) { log("Lỗi kết nối AI: " + err, "error"); }
        }

        function handleCommand() {
            const input = document.getElementById('userInput');
            const cmd = input.value.trim();
            if(!cmd) return;
            log(cmd, "success");
            askAI(cmd);
            input.value = "";
        }
    </script>
</body>
</html>
