<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T JOHN AI | CORE V8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --neon: #00f2ff; }
        body { 
            background: url('https://raw.githubusercontent.com/Thuan101/T-John-Ai/main/1000181678.jpg') no-repeat center center fixed; 
            background-size: cover; color: var(--neon); font-family: 'Courier New', monospace; 
            overflow: hidden; height: 100vh; margin: 0; 
        }
        .neon-glow { text-shadow: 0 0 15px var(--neon); }
        .glass { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px); border: 1px solid rgba(0, 242, 255, 0.3); }
        #admin-vault { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; align-items: center; justify-content: center; padding: 15px; }
        .vault-box { width: 100%; max-width: 450px; padding: 25px; border-radius: 20px; border: 2px solid var(--neon); }
        .btn-tool { background: rgba(0, 242, 255, 0.1); border: 1px solid var(--neon); color: var(--neon); font-size: 10px; padding: 6px 12px; border-radius: 4px; }
    </style>
</head>
<body class="flex flex-col">

    <header class="text-center py-4">
        <h1 class="text-4xl font-black italic neon-glow uppercase">T JOHN AI</h1>
        <div class="text-[10px] tracking-[0.3em] text-cyan-400 font-bold uppercase">Founder: T Thuận</div>
    </header>

    <main class="flex-grow px-4 pb-48 overflow-hidden">
        <div id="terminal" class="h-full glass p-4 rounded-2xl overflow-y-auto text-[11px] leading-relaxed shadow-2xl">
            <div id="logs" class="space-y-2">
                <div class="text-white/40">[HỆ THỐNG]: Đã sửa lỗi Model ID cho bản V8...</div>
                <div class="text-cyan-400">[T JOHN]: Chào Nhà sáng lập. Chìa khóa đã sẵn sàng bên dưới.</div>
            </div>
        </div>
    </main>

    <section class="fixed bottom-0 left-0 w-full glass p-4 border-t border-cyan-500/30 z-20">
        <div class="flex gap-2 justify-center mb-4">
            <button onclick="copyCode()" class="btn-tool">COPY CODE</button>
            <button onclick="downloadApp()" class="btn-tool">TẢI FILE</button>
            <label class="btn-tool cursor-pointer">NẠP FILE <input type="file" class="hidden" onchange="handleFile(event)"></label>
        </div>
        <div class="flex gap-2 max-w-4xl mx-auto">
            <input type="text" id="userInput" placeholder="Nhập lệnh điều hành..." 
                class="flex-grow bg-black/60 border border-cyan-900 p-4 rounded-2xl text-white outline-none focus:border-cyan-400">
            <button onclick="execute()" class="bg-cyan-500 text-black px-6 rounded-2xl font-black shadow-lg">GỬI</button>
            <button onclick="toggleVault()" class="px-4 rounded-2xl border border-cyan-900 bg-black/40 text-xl">🔐</button>
        </div>
    </section>

    <div id="admin-vault">
        <div class="vault-box glass">
            <h2 class="text-2xl font-bold mb-6 italic neon-glow text-center uppercase">Phòng Điều Hành</h2>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] text-cyan-500 font-bold uppercase ml-1">Gemini API Key</label>
                    <input type="text" id="key-gemini" placeholder="Dán Key mới vào đây..." class="w-full bg-zinc-800 p-3 rounded-xl text-yellow-400 border border-zinc-700 text-[10px]">
                </div>
                <div>
                    <label class="text-[10px] text-cyan-500 font-bold uppercase ml-1">GitHub Token</label>
                    <input type="text" id="key-github" class="w-full bg-zinc-800 p-3 rounded-xl text-yellow-400 border border-zinc-700 text-[10px]">
                </div>
                <div>
                    <label class="text-[10px] text-yellow-500 font-bold uppercase ml-1">Jina Reader Key</label>
                    <input type="text" id="key-jina" class="w-full bg-zinc-800 p-3 rounded-xl text-yellow-400 border border-zinc-700 text-[10px]">
                </div>
                <button onclick="saveVault()" class="w-full bg-cyan-600 py-4 rounded-xl font-black text-black uppercase mt-4">LƯU CẤU HÌNH</button>
            </div>
            <button onclick="toggleVault()" class="w-full mt-6 text-[10px] opacity-40 uppercase underline">Đóng</button>
        </div>
    </div>

    <script>
        let lastCode = "", controller = null;

        window.onload = () => {
            document.getElementById('key-gemini').value = localStorage.getItem('gemini_key') || "";
            document.getElementById('key-github').value = localStorage.getItem('github_key') || "";
            document.getElementById('key-jina').value = localStorage.getItem('jina_key') || "";
        };

        function toggleVault() {
            const v = document.getElementById('admin-vault');
            v.style.display = (v.style.display === 'flex') ? 'none' : 'flex';
        }

        function saveVault() {
            localStorage.setItem('gemini_key', document.getElementById('key-gemini').value.trim());
            localStorage.setItem('github_key', document.getElementById('key-github').value.trim());
            localStorage.setItem('jina_key', document.getElementById('key-jina').value.trim());
            alert("Đã lưu!");
            location.reload();
        }

        async function askAI(prompt) {
            const k = localStorage.getItem('gemini_key');
            if(!k) return log("LỖI: Chưa có Key!", "error");

            controller = new AbortController();
            log("T John đang thi hành lệnh...", "info");

            try {
                // FIX: Đổi Model ID sang gemini-1.5-flash để ổn định nhất cho bản Free
                const model = "gemini-1.5-flash"; 
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${k}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    signal: controller.signal,
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Founder: T Thuận. Hãy viết code đầy đủ. Yêu cầu: ${prompt}` }]}]
                    })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                const text = data.candidates[0].content.parts[0].text;
                const match = text.match(/```html([\s\S]*?)```/);
                if(match) lastCode = match[1];
                log(text.replace(/```[\s\S]*?```/g, "[MÃ NGUỒN]"), "ai");
            } catch (e) {
                log("LỖI: " + e.message, "error");
            }
        }

        function execute() {
            const input = document.getElementById('userInput');
            if(!input.value) return;
            log(input.value, "success");
            askAI(input.value);
            input.value = "";
        }

        function log(m, t) {
            const logs = document.getElementById('logs');
            const d = document.createElement('div');
            const c = { success: 'text-green-400', error: 'text-red-500 font-bold', ai: 'text-white italic' };
            d.className = `${c[t] || 'text-cyan-400'} border-l-2 border-current pl-3 py-1 mb-2`;
            d.innerHTML = `> ${m}`;
            logs.appendChild(d);
            document.getElementById('terminal').scrollTop = document.getElementById('terminal').scrollHeight;
        }

        function copyCode() { if(lastCode) { navigator.clipboard.writeText(lastCode); alert("Đã copy!"); } }
        function downloadApp() { if(lastCode) { const blob = new Blob([lastCode], {type: 'text/html'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `T-JOHN-APP.html`; a.click(); } }
        function handleFile(e) { log("Đã nhận file: " + e.target.files[0].name, "info"); }
    </script>
</body>
</html>
