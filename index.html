<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T John AI - Corrected Interface</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background-color: #000;
        }

        /* Tái tạo nền Trái đất */
        .earth-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Thay thế đường dẫn này bằng hình ảnh nền của bạn */
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/e/ec/Indian_Ocean_Earth_at_Night_Blue_Marble_2012.jpg');
            background-size: cover;
            background-position: center;
            opacity: 0.8; /* Giảm độ sáng một chút để UI nổi bật */
            z-index: -1;
        }

        /* Giao diện chính */
        .app-container {
            display: flex;
            width: 100vw;
            height: 100vh;
            color: white;
            z-index: 1;
        }

        /* Sidebar trái */
        .sidebar {
            width: 80px;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            border-right: 1px solid rgba(0, 255, 0, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
        }

        .sidebar h1 {
            color: #00FF00;
            font-size: 14px;
            margin: 0 0 20px 0;
            text-align: center;
        }

        .new-chat-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #00FF00;
            cursor: pointer;
            transition: opacity 0.2s;
            pointer-events: auto; /* Đảm bảo có thể nhấp */
        }

        .new-chat-btn:hover {
            opacity: 0.8;
        }

        .plus-icon {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #00FF00;
            color: white;
            font-size: 20px;
            margin-bottom: 5px;
        }

        .sidebar span {
            font-size: 10px;
            text-align: center;
        }

        /* Nội dung chính */
        .main-content {
            flex: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.5);
        }

        .welcome-section {
            display: flex;
            flex-direction: column;
            align-items: flex-end; /* Căn phải như trong hình */
            text-align: right;
            color: #00FF00;
            margin-bottom: auto; /* Đẩy section này lên trên */
        }

        .welcome-section h2 {
            font-size: 16px;
            margin: 0 0 10px 0;
        }

        .welcome-section p {
            font-size: 12px;
            margin: 0 0 20px 0;
            opacity: 0.9;
            max-width: 60%;
        }

        /* Khu vực nhập liệu dưới cùng */
        .input-bar {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: calc(100% - 120px); /* Bố cục để Sidebar không bị che */
            height: 40px;
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 20px;
            border: 1px solid rgba(0, 255, 0, 0.3);
            padding: 0 10px;
            box-sizing: border-box;
            pointer-events: auto; /* Đảm bảo có thể nhấp */
        }

        .input-bar i {
            color: #00FF00;
            margin-right: 10px;
        }

        .input-bar input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .input-bar input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .send-btn {
            cursor: pointer;
            color: #00FF00;
            font-size: 18px;
            transition: opacity 0.2s;
            pointer-events: auto; /* Đảm bảo có thể nhấp */
        }

        .send-btn:hover {
            opacity: 0.8;
        }

    </style>
</head>
<body>
    <div class="earth-background"></div>

    <div class="app-container">
        <div class="sidebar">
            <h1>T JOHN AI</h1>
            <div class="new-chat-btn" id="newChatBtn">
                <div class="plus-icon">+</div>
                <span>Cuộc trò chuyện mới</span>
            </div>
        </div>

        <div class="main-content">
            <div class="welcome-section">
                <h2>Xin chào, Nhà sáng lập Thuận</h2>
                <p>Hệ thống T John AI đang sẵn sàng. Hãy đặt câu hỏi và phân tích một cách chính xác nhất!</p>
                <p>Phân tích trò chuyện này (Phiên trò chuyện này...) đang được làm sạch. Bạn muốn tạo gì?</p>
            </div>
        </div>

        <div class="input-bar">
            <i class="fas fa-globe">🌍</i>
            <input type="text" placeholder="Hỏi tôi về bất cứ điều gì...">
            <span class="send-btn" id="sendBtn">▶️</span>
        </div>
    </div>

    <script>
        // Xử lý nhấp vào "Cuộc trò chuyện mới"
        document.getElementById('newChatBtn').addEventListener('click', function() {
            console.log('Nút Cuộc trò chuyện mới được nhấp');
            alert('Nút "Cuộc trò chuyện mới" hoạt động!');
            // Thêm logic của bạn ở đây để xóa trò chuyện hiện tại
        });

        // Xử lý nhấp vào nút gửi
        document.getElementById('sendBtn').addEventListener('click', function() {
            const input = document.querySelector('.input-bar input');
            const message = input.value;
            if (message.trim() !== '') {
                console.log('Đã gửi tin nhắn:', message);
                alert('Đã gửi tin nhắn: ' + message);
                input.value = ''; // Xóa input sau khi gửi
                // Thêm logic của bạn ở đây để hiển thị tin nhắn và gọi AI
            }
        });

        // Xử lý khi nhấn phím Enter trong ô nhập liệu
        document.querySelector('.input-bar input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('sendBtn').click();
            }
        });
    </script>
</body>
</html>
