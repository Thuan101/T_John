<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T JOHN AI | ULTIMATE OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --neon: #00f2ff; --bg-fallback: #050505; }
        
        /* NỀN CHÍNH LÀ ẢNH HỐ ĐEN CỦA FOUNDER */
        body { 
            background: url('https://raw.githubusercontent.com/Thuan101/T-John-Ai/main/1000181678.jpg') no-repeat center center fixed; 
            background-size: cover;
            color: var(--neon); 
            font-family: 'Courier New', monospace; 
            overflow: hidden; 
            height: 100vh; 
            margin: 0; 
        }

        .neon-glow { text-shadow: 0 0 10px var(--neon), 0 0 20px var(--neon); }
        .neon-border { border: 1px solid var(--neon); box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }
        
        /* Layout khu vực - Làm kính mờ (Glassmorphism) để thấy nền */
        #admin-vault { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 5000; backdrop-filter: blur(15px); }
        #sandbox-area { display: none; position: fixed; top: 5%; left: 5%; width: 90%; height: 80%; z-index: 4000; background: white; border-radius: 15px; overflow: hidden; }
        
        .scanline { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, transparent 50%, rgba(0, 242, 255, 0.02) 50%); background-size: 100% 4px; pointer-events: none; z-index: 100; }
        
        .chat-zone { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.8); padding: 15px; border-top: 1px solid var(--neon); z-index: 200; backdrop-filter: blur(5px); }
        #terminal { scroll-behavior: smooth; background: rgba(0, 0, 0, 0.6); }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body class="flex flex-col">
    <div class="scanline"></div>

    <header class="flex flex-col items-center justify-center py-6 z-10">
        <h1 class="text-5xl md:text-6xl font-black italic tracking-tighter neon-glow uppercase">T JOHN AI</h1>
        <div class="text-[10px] tracking-[0.5em] text-cyan-300 font-bold opacity-90 bg-black/40 px-2 py-1">NHÀ SÁNG LẬP: T THUẬN</div>
    </header>

    <main class="flex-grow px-4 pb-44 overflow-hidden z-10">
        <div id="terminal" class="h-full neon-border p-4 rounded-xl overflow-y-auto text-xs leading-relaxed">
            <div id="logs" class="space-y-2">
                <div class="text-white/60 font-bold">[HỆ THỐNG]: Khởi tạo không gian Hố Đen thành công...</div>
                <div class="text-white/40">[TIN NHẮN]: Chào Nhà sáng lập T Thuận. Đang đợi xác thực từ Vault.</div>
            </div>
        </div>
    </main>

    <section class="chat-zone flex flex-col gap-3">
        <div class="flex gap-2 justify-center">
            <button onclick="downloadApp()" class="px-3 py-1 border border-cyan-700 rounded text-[9px] hover:bg-cyan-500 hover:text-black transition-all">XUẤT FILE</button>
            <button onclick="abortMission()" id="stopBtn" class="hidden px-3 py-1 border border-red-600 rounded text-[9px] text-red-500 font-bold">DỪNG LỆNH</button>
            <label class="px-3 py-1 border border-yellow-600 rounded text-[9px] text-yellow-500 cursor-pointer hover:bg-yellow-600 hover:text-black">
                NẠP FILE <input type="file" id="dropZone" class="hidden" onchange="handleFile(event)">
            </label>
        </div>
        <div class="flex gap-2">
            <input type="text" id="userInput" autocomplete="off" placeholder="Nhập lệnh điều hành hoặc Mã đặc biệt..." 
                class="flex-grow bg-black/60 border border-cyan-900 p-3 rounded-xl text-white outline-none focus:border-cyan-400 text-sm">
            <button onclick="execute()" class="bg-cyan-500 text-black px-5 rounded-xl font-black shadow-lg active:scale-95 transition-transform">GỬI</button>
            <button onclick="toggleVault()" class="px-3 rounded-xl border border-cyan-900 bg-black/40">🔐</button>
        </div>
    </section>

    <div id="sandbox-area" class="neon-border">
        <div class="bg-zinc-900 p-2 flex justify-between items-center text-white border-b border-cyan-900">
            <span class="text-[10px] font-bold text-cyan-400 ml-2 uppercase">T-John Foundry Sandbox</span>
            <button onclick="closeSandbox()" class="text-red-500 font-black px-2 hover:bg-red-500/20 rounded">ĐÓNG [X]</button>
        </div>
        <iframe id="sandbox-iframe"></iframe>
    </div>

    <div id="admin-vault" class="flex items-center justify-center p-6">
        <div class="w-full max-w-md p-8 neon-border bg-black/90 rounded-3xl text-center shadow-2xl">
            <h2 class="text-2xl font-bold mb-6 italic neon-glow tracking-widest uppercase">Phòng Điều Hành</h2>
            <input type="password" id="vaultPass" placeholder="NHẬP MẬT MÃ ADMIN..." 
                class="w-full bg-zinc-900 border border-cyan-900 p-4 rounded-xl mb-4 text-white text-center tracking-[0.3em] outline-none">
            
            <div id="vault-content" class="hidden space-y-4 text-left">
                <div>
                    <label class="text-[9px] text-cyan-500 ml-1 font-bold">GEMINI API KEY</label>
                    <input type="password" id="key-gemini" class="w-full bg-zinc-800 p-3 rounded-lg text-xs text-white border border-zinc-700">
                </div>
                <div>
                    <label class="text-[9px] text-cyan-500 ml-1 font-bold">GITHUB TOKEN (Nếu có)</label>
                    <input type="password" id="key-github" class="w-full bg-zinc-800 p-3 rounded-lg text-xs text-white border border-zinc-700">
                </div>
                <button onclick="secureSave()" class="w-full bg-cyan-600 py-4 rounded-xl font-black text-black uppercase shadow-[0_0_20px_rgba(0,242,255,0.3)] hover:bg-cyan-400">KÍCH HOẠT HẠT NHÂN</button>
            </div>
            <button onclick="toggleVault()" class="mt-8 text-[10px] opacity-40 hover:opacity-100 uppercase underline">Thoát hệ thống</button>
        </div>
    </div>

    <script>
        const ADMIN_HASH = "ADMIN_T.JOHN.AI_Q.Thuan:7329000";
        const GOD_CODE = "#DESIGN_T.JOHN.AI_NOW";
        
        let controller = null;
        let lastCode = "";

        const vaultSecret = {
            encode: (str) => btoa(encodeURIComponent(str)),
            decode: (str) => {
                if(!str) return null;
                try { return decodeURIComponent(atob(str)); } 
                catch(e) { return str; } // Trả về text gốc nếu chưa mã hóa
            }
        };

        function toggleVault() {
            const v = document.getElementById('admin-vault');
            v.style.display = v.style.display === 'flex' ? 'none' : 'flex';
        }

        document.getElementById('vaultPass').addEventListener('input', (e) => {
            if(e.target.value === ADMIN_HASH) {
                document.getElementById('vault-content').classList.remove('hidden');
                e.target.style.display = 'none';
                log("HỆ THỐNG: Truy cập Admin được chấp nhận.", "success");
            }
        });

        function secureSave() {
            const g = document.getElementById('key-gemini').value;
            const h = document.getElementById('key-github').value;
            if(!g) return alert("Vui lòng nạp API Key!");
            localStorage.setItem('_tj_g', vaultSecret.encode(g));
            localStorage.setItem('_tj_h', vaultSecret.encode(h));
            log("HỆ THỐNG: Dữ liệu đã được niêm phong bảo mật.", "success");
            toggleVault();
        }

        async function askAI(prompt, base64File = null) {
            const gKey = vaultSecret.decode(localStorage.getItem('_tj_g'));
            if(!gKey) return log("LỖI: Vault đang trống. Vui lòng nạp Key!", "error");

            controller = new AbortController();
            document.getElementById('stopBtn').classList.remove('hidden');
            log("T John đang xử lý dữ liệu...", "info");

            const systemPrompt = "Bạn là T John AI, trợ lý tối cao của Nhà sáng lập T Thuận. Luôn viết FULL code HTML/CSS/JS không lược bỏ.";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${gKey}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    signal: controller.signal,
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `${systemPrompt}\nYêu cầu: ${prompt}` }]}]
                    })
                });

                const data = await response.json();
                
                if(data.candidates && data.candidates[0]) {
                    const text = data.candidates[0].content.parts[0].text;
                    const codeMatch = text.match(/```html([\s\S]*?)```/);
                    if(codeMatch) {
                        lastCode = codeMatch[1];
                        document.getElementById('sandbox-area').style.display = 'block';
                        document.getElementById('sandbox-iframe').srcdoc = lastCode;
                        log("PHÂN TÍCH: Đã trích xuất mã nguồn mới vào Sandbox.", "success");
                    }
                    log(text.replace(/```[\s\S]*?```/g, "[CODE ĐÃ XỬ LÝ]"), "ai");
                } else {
                    log("LỖI: API không phản hồi. Kiểm tra Key trong Vault.", "error");
                }
            } catch (err) {
                if(err.name !== 'AbortError') log("LỖI HỆ THỐNG: " + err.message, "error");
            } finally {
                document.getElementById('stopBtn').classList.add('hidden');
            }
        }

        function execute() {
            const input = document.getElementById('userInput');
            const val = input.value.trim();
            if(!val) return;

            if(val === GOD_CODE) {
                document.designMode = "on";
                log("GOD MODE: Đã mở khóa quyền sửa trang trực tiếp!", "success");
            } else {
                log(val, "success");
                askAI(val);
            }
            input.value = "";
        }

        function log(msg, type) {
            const logs = document.getElementById('logs');
            const d = document.createElement('div');
            const colors = { success: 'text-green-400', error: 'text-red-500', ai: 'text-white italic', info: 'text-cyan-400' };
            d.className = `${colors[type] || 'text-white'} border-l-2 border-current pl-2 py-1`;
            d.innerHTML = `<span class="opacity-30">[${new Date().toLocaleTimeString()}]</span> ${msg}`;
            logs.appendChild(d);
            document.getElementById('terminal').scrollTop = document.getElementById('terminal').scrollHeight;
        }

        function handleFile(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                const base64 = event.target.result.split(',')[1];
                log(`FILE: Đã nhận diện ${file.name}.`, "success");
                askAI(`Phân tích file này và làm theo ý tôi.`, base64);
            };
            reader.readAsDataURL(file);
        }

        function abortMission() { if(controller) controller.abort(); log("LỆNH: Đã ngắt kết nối theo ý Nhà sáng lập.", "error"); }
        function closeSandbox() { document.getElementById('sandbox-area').style.display = 'none'; }
        function downloadApp() {
            if(!lastCode) return alert("Không có dữ liệu!");
            const blob = new Blob([lastCode], {type: 'text/html'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `T-JOHN-APP-${Date.now()}.html`;
            a.click();
        }
    </script>
</body>
</html>
