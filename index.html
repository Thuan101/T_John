<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T JOHN AI - OS VERSION FULL POWER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/idb@7/build/umd.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap');
        :root { --neon-orange: #ff8c00; --neon-green: #00ff41; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .neon-text-green { text-shadow: 0 0 10px var(--neon-green); color: var(--neon-green); }
        .border-neon-orange { border: 1px solid var(--neon-orange); box-shadow: 0 0 10px rgba(255, 140, 0, 0.3); }
        .loading-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        /* Tùy chỉnh thanh cuộn */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--neon-orange); border-radius: 10px; }
    </style>
</head>
<body class="overflow-hidden">

    <aside id="sidebar" class="fixed left-0 top-0 h-full w-72 bg-black border-r border-orange-500/30 z-50 transition-transform -translate-x-full lg:translate-x-0">
        <div class="p-6 h-full flex flex-col">
            <div class="mb-10">
                <h2 class="text-2xl font-black neon-text-green font-orbitron italic">T JOHN AI</h2>
                <p class="text-xs text-orange-500 mt-1 uppercase tracking-widest">Founder: T Thuận</p>
            </div>
            
            <nav class="flex-1 space-y-2 overflow-y-auto" id="chatHistory">
                </nav>

            <div class="pt-6 border-t border-orange-500/20 space-y-3">
                <button onclick="app.createNewChat()" class="w-full py-3 bg-orange-600/20 border border-orange-500 hover:bg-orange-600/40 rounded-xl transition-all flex items-center justify-center gap-2">
                    <span>+ Chat Mới</span>
                </button>
                <button onclick="app.openAdmin()" class="w-full py-3 bg-red-900/20 border border-red-500/50 text-red-500 hover:bg-red-500 hover:text-white rounded-xl transition-all">
                    Chế độ Nhà tạo lập
                </button>
            </div>
        </div>
    </aside>

    <main class="lg:ml-72 h-screen flex flex-col relative">
        <header class="p-4 border-b border-orange-500/20 flex justify-between items-center bg-black/50 backdrop-blur-md">
            <div class="flex items-center gap-4">
                <button onclick="app.toggleSidebar()" class="lg:hidden text-orange-500 text-2xl">☰</button>
                <div id="statusIndicator" class="hidden flex items-center gap-3 bg-gray-900 px-4 py-2 rounded-full border border-gray-700">
                    <div id="statusIcon" class="w-3 h-3 rounded-full bg-white loading-spin border-2 border-t-transparent"></div>
                    <span id="statusText" class="text-sm font-mono">Đang kết nối...</span>
                </div>
            </div>
            <div class="text-right">
                <div id="clock" class="font-orbitron text-orange-500 text-sm">00:00:00</div>
            </div>
        </header>

        <section id="chatViewport" class="flex-1 overflow-y-auto p-6 space-y-6 custom-scroll">
            <div class="h-full flex flex-col items-center justify-center opacity-30">
                <img src="https://cdn-icons-png.flaticon.com/512/2103/2103633.png" class="w-32 grayscale mb-4">
                <p class="font-orbitron tracking-widest">HỆ THỐNG SẴN SÀNG - CHỜ LỆNH</p>
            </div>
        </section>

        <div id="sandboxContainer" class="hidden absolute top-20 right-6 w-1/3 h-2/3 bg-white rounded-xl shadow-2xl overflow-hidden border-4 border-orange-500 z-40">
            <div class="bg-gray-800 p-2 flex justify-between items-center text-white">
                <span class="text-xs font-mono">Instant Sandbox</span>
                <button onclick="app.closeSandbox()">✕</button>
            </div>
            <iframe id="sandboxFrame" class="w-full h-full bg-white"></iframe>
        </div>

        <footer class="p-6 bg-gradient-to-t from-black to-transparent">
            <div class="max-w-4xl mx-auto relative group">
                <div class="flex items-end gap-3 bg-gray-900/80 p-2 rounded-2xl border border-orange-500/30 focus-within:border-orange-500 transition-all shadow-lg">
                    <label class="p-4 cursor-pointer hover:text-orange-500 transition-colors">
                        <input type="file" id="fileInput" class="hidden" multiple>
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    </label>
                    <textarea id="userInput" rows="1" placeholder="Nhập lệnh thực thi (Tạo ảnh, code, video...)" 
                              class="flex-1 bg-transparent border-none focus:ring-0 text-white py-4 resize-none max-h-40"></textarea>
                    <button id="actionBtn" onclick="app.handleSend()" class="m-2 p-4 bg-orange-600 rounded-xl hover:bg-orange-500 transition-all shadow-orange-500/20 shadow-lg">
                        <div id="btnIcon">
                            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"></path></svg>
                        </div>
                    </button>
                </div>
            </div>
        </footer>
    </main>

    <div id="adminModal" class="fixed inset-0 bg-black/95 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-gray-900 border-2 border-orange-500 w-full max-w-4xl max-h-[90vh] rounded-3xl overflow-hidden flex flex-col">
            <div class="p-6 border-b border-orange-500/30 flex justify-between items-center bg-orange-500/10">
                <h2 class="text-xl font-orbitron neon-text-green tracking-tighter">ADMIN VAULT - T JOHN SYSTEM</h2>
                <button onclick="app.closeAdmin()" class="text-2xl hover:text-red-500">✕</button>
            </div>
            <div class="flex-1 overflow-y-auto p-8 space-y-8">
                <section>
                    <h3 class="text-orange-500 font-bold mb-4 uppercase">Cấu hình API Hệ thống</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs opacity-50 mb-1">Gemini API Key</label>
                            <input type="password" id="key_gemini" class="w-full bg-black border border-gray-700 p-3 rounded-lg focus:border-orange-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs opacity-50 mb-1">GitHub Token</label>
                            <input type="password" id="key_github" class="w-full bg-black border border-gray-700 p-3 rounded-lg focus:border-orange-500 outline-none">
                        </div>
                    </div>
                    <button onclick="app.saveSettings()" class="mt-4 px-6 py-2 bg-green-600 rounded-lg text-sm hover:bg-green-500">Lưu cấu hình</button>
                </section>

                <section>
                    <h3 class="text-orange-500 font-bold mb-4 uppercase">Nhật ký hệ thống (Read-only)</h3>
                    <div id="logContainer" class="bg-black p-4 rounded-xl font-mono text-xs h-48 overflow-y-auto border border-gray-800">
                        </div>
                </section>
            </div>
        </div>
    </div>

    <script>
        /*
        * T JOHN AI - CORE ENGINE
        * Phiên bản: 1.0 (OS Version)
        */
        class TJohnEngine {
            constructor() {
                this.db = null;
                this.isGenerating = false;
                this.currentChat = 'default';
                this.adminKey = 'ADMIN_T.JOHN.AI_Q.Thuan:7329000';
                this.init();
            }

            async init() {
                // Khởi tạo DB
                this.db = await idb.openDB('TJohnDB', 1, {
                    upgrade(db) {
                        db.createObjectStore('settings');
                        db.createObjectStore('chats', { keyPath: 'id' });
                        db.createObjectStore('logs', { keyPath: 'timestamp' });
                    }
                });

                this.updateClock();
                setInterval(() => this.updateClock(), 1000);
                this.log('Hệ thống khởi động thành công');
                this.renderChatHistory();
            }

            // --- UI CONTROLS ---
            updateClock() {
                const now = new Date();
                document.getElementById('clock').textContent = now.toLocaleTimeString('vi-VN');
            }

            toggleSidebar() {
                document.getElementById('sidebar').classList.toggle('-translate-x-full');
            }

            log(action) {
                const entry = { timestamp: Date.now(), action };
                this.db.put('logs', entry);
                const logDiv = document.getElementById('logContainer');
                if(logDiv) {
                    const p = document.createElement('p');
                    p.className = 'text-gray-500 mb-1';
                    p.innerHTML = `<span class="text-orange-900">[${new Date().toLocaleTimeString()}]</span> ${action}`;
                    logDiv.prepend(p);
                }
            }

            // --- CHAT LOGIC ---
            async handleSend() {
                if (this.isGenerating) {
                    this.stopGeneration();
                    return;
                }

                const input = document.getElementById('userInput');
                const text = input.value.trim();
                if (!text) return;

                this.addMessage('user', text);
                input.value = '';
                this.setLoading(true);

                // Giả lập xử lý AI (Trong thực tế sẽ fetch Gemini API ở đây)
                setTimeout(() => {
                    this.processIntent(text);
                }, 1500);
            }

            async processIntent(text) {
                this.log(`Thực thi lệnh: ${text.substring(0, 30)}...`);
                
                if (text.toLowerCase().includes("tạo ảnh")) {
                    const prompt = text.replace("tạo ảnh", "").trim();
                    const imgUrl = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=1024&height=1024&nologo=true`;
                    this.addMessage('ai', `Đã tạo ảnh theo yêu cầu của bạn:`, 'image', imgUrl);
                } 
                else if (text.toLowerCase().includes("tạo web") || text.toLowerCase().includes("tạo game")) {
                    const code = `<!DOCTYPE html><html><body style="background:black;color:orange;display:flex;justify-content:center;align-items:center;height:100vh;font-family:sans-serif"><h1>BẢN DEMO ỨNG DỤNG</h1></body></html>`;
                    this.addMessage('ai', "Tôi đã lập trình xong ứng dụng. Bạn có thể xem trực tiếp tại Sandbox.", 'code', code);
                    this.openSandbox(code);
                }
                else {
                    this.addMessage('ai', "Đây là phản hồi từ bộ não Gemini 1.5 Pro (Giả lập). Hệ thống đang chờ kết nối API Key thực tế từ Admin Vault để hoạt động toàn diện.");
                }

                this.setLoading(false);
            }

            addMessage(role, content, type = 'text', extra = '') {
                const viewport = document.getElementById('chatViewport');
                const div = document.createElement('div');
                div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} animate-fade-in`;
                
                let innerHTML = `
                    <div class="max-w-[85%] ${role === 'user' ? 'bg-orange-600/20 border border-orange-500/50' : 'bg-gray-800'} p-4 rounded-2xl">
                        <p class="text-sm leading-relaxed">${content}</p>
                `;

                if (type === 'image') innerHTML += `<img src="${extra}" class="mt-3 rounded-lg border border-orange-500 shadow-lg">`;
                if (type === 'code') innerHTML += `<pre class="mt-3 bg-black p-3 rounded overflow-x-auto text-xs text-green-400"><code>${extra.replace(/</g, '&lt;')}</code></pre>`;

                innerHTML += `</div>`;
                div.innerHTML = innerHTML;
                viewport.appendChild(div);
                viewport.scrollTop = viewport.scrollHeight;
            }

            setLoading(status) {
                this.isGenerating = status;
                const bar = document.getElementById('statusIndicator');
                const text = document.getElementById('statusText');
                const btnIcon = document.getElementById('btnIcon');

                if (status) {
                    bar.classList.remove('hidden');
                    text.textContent = "T John đang tạo...";
                    btnIcon.innerHTML = `<svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8 7a1 1 0 00-1 1v4a1 1 0 001 1h4a1 1 0 001-1V8a1 1 0 00-1-1H8z" clip-rule="evenodd"></path></svg>`;
                } else {
                    text.textContent = "T John đã tạo xong ✓";
                    document.getElementById('statusIcon').classList.remove('loading-spin');
                    setTimeout(() => bar.classList.add('hidden'), 3000);
                    btnIcon.innerHTML = `<svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"></path></svg>`;
                }
            }

            // --- ADMIN LOGIC ---
            openAdmin() {
                const pass = prompt("NHẬP MÃ ADMIN_T.JOHN.AI:");
                if (pass === this.adminKey) {
                    document.getElementById('adminModal').classList.remove('hidden');
                    this.log("Truy cập Admin thành công");
                    this.loadSettings();
                } else {
                    this.log("CẢNH BÁO: Truy cập Admin thất bại (Sai mã)");
                    alert("Truy cập bị từ chối!");
                }
            }

            closeAdmin() { document.getElementById('adminModal').classList.add('hidden'); }

            async saveSettings() {
                const settings = {
                    gemini: document.getElementById('key_gemini').value,
                    github: document.getElementById('key_github').value
                };
                await this.db.put('settings', settings, 'api_keys');
                this.log("Cập nhật API Key thành công");
                alert("Đã lưu!");
            }

            async loadSettings() {
                const keys = await this.db.get('settings', 'api_keys');
                if (keys) {
                    document.getElementById('key_gemini').value = keys.gemini;
                    document.getElementById('key_github').value = keys.github;
                }
            }

            openSandbox(html) {
                const container = document.getElementById('sandboxContainer');
                const frame = document.getElementById('sandboxFrame');
                container.classList.remove('hidden');
                frame.srcdoc = html;
            }

            closeSandbox() { document.getElementById('sandboxContainer').classList.add('hidden'); }
        }

        const app = new TJohnEngine();
    </script>
</body>
</html>
